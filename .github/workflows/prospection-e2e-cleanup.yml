name: Prospection â€” cleanup throwaway e2e users (staging)

# Scheduled cron to delete e2e-<timestamp>@yopmail.com users older than 24h
# on staging. Keeps Supabase auth.users lean so listUsers pagination stays
# cheap and the /api/tenants/provision flow doesn't have to scan 10k rows.
# Persistent user e2e-persistent@yopmail.com is protected by the route.

on:
  schedule:
    # Every day at 03:00 UTC (05:00 Paris)
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      older_than_hours:
        description: "Age threshold in hours (default 24)"
        required: false
        default: "24"
      dry_run:
        description: "Only count, don't delete"
        required: false
        type: boolean
        default: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      # Staging accessible uniquement via tailnet Veridian depuis 2026-05-19
      # (cf veridian-hub/docs/CONTRAT-HUB.md Â§8.6 + CI-ARCHITECTURE.md Â§20).
      # Le runner doit rejoindre le tailnet via tag:ci-github avant tout
      # appel Ă  prospection.staging.veridian.site (rĂ©sout vers IP Tailscale).
      - name: Tailscale (connect runner to tailnet for staging call)
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-github
          version: latest

      - name: Call /api/tenants/e2e-cleanup (staging)
        env:
          TENANT_SECRET: ${{ secrets.STAGING_TENANT_API_SECRET }}
          OLDER: ${{ inputs.older_than_hours || '24' }}
          DRY: ${{ inputs.dry_run || 'false' }}
        run: |
          # HMAC standard contrat Â§6.1 â€” signature {ts}.{rawBody} dans les
          # headers. Le legacy "payload:ts" dans le body reste acceptĂ© tant que
          # ACCEPT_LEGACY_HMAC=1 cĂ´tĂ© Prospection (cf docs/hub-contract.md).
          TS=$(date +%s)000
          BODY=$(printf '{"olderThanHours":%s,"dryRun":%s}' "$OLDER" "$DRY")
          SIG=$(printf '%s.%s' "$TS" "$BODY" | openssl dgst -sha256 -hmac "$TENANT_SECRET" | sed 's/^.* //')
          echo "Calling e2e-cleanup (olderThanHours=$OLDER dryRun=$DRY)..."
          RESP=$(curl -s -X POST https://prospection.staging.veridian.site/api/tenants/e2e-cleanup \
            -H "Content-Type: application/json" \
            -H "X-Veridian-Timestamp: $TS" \
            -H "X-Veridian-Hub-Signature: $SIG" \
            -d "$BODY")
          echo "$RESP" | python3 -m json.tool
          # Fail CI if the route returned an error
          echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(1 if 'error' in d else 0)"

      # Alerte Telegram on:failure â€” colmate l'angle mort Â§18.3 (cron silencieux).
      # Le cron e2e-cleanup avait tournĂ© 5j en erreur sans alerte avant ce fix.
      # Tout cron Prospection DOIT dĂ©sormais avoir cette step en queue de job.
      - name: Notify Telegram on failure
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode=HTML \
            -d "text=đźš¨ <b>Cron e2e-cleanup</b> failed%0A<a href=\"${RUN_URL}\">View run</a>" \
            >/dev/null || true
