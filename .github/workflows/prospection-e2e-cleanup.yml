name: Prospection — cleanup throwaway e2e users (staging)

# Scheduled cron to delete e2e-<timestamp>@yopmail.com users older than 24h
# on staging. Keeps Supabase auth.users lean so listUsers pagination stays
# cheap and the /api/tenants/provision flow doesn't have to scan 10k rows.
# Persistent user e2e-persistent@yopmail.com is protected by the route.

on:
  schedule:
    # Every day at 03:00 UTC (05:00 Paris)
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      older_than_hours:
        description: "Age threshold in hours (default 24)"
        required: false
        default: "24"
      dry_run:
        description: "Only count, don't delete"
        required: false
        type: boolean
        default: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/tenants/e2e-cleanup (staging)
        env:
          TENANT_SECRET: ${{ secrets.STAGING_TENANT_API_SECRET }}
          OLDER: ${{ inputs.older_than_hours || '24' }}
          DRY: ${{ inputs.dry_run || 'false' }}
        run: |
          TS=$(date +%s)000
          SIG=$(echo -n "e2e-cleanup:$TS" | openssl dgst -sha256 -hmac "$TENANT_SECRET" | sed 's/^.* //')
          echo "Calling e2e-cleanup (olderThanHours=$OLDER dryRun=$DRY)..."
          RESP=$(curl -s -X POST https://saas-prospection.staging.veridian.site/api/tenants/e2e-cleanup \
            -H "Content-Type: application/json" \
            -d "{\"timestamp\":$TS,\"signature\":\"$SIG\",\"olderThanHours\":$OLDER,\"dryRun\":$DRY}")
          echo "$RESP" | python3 -m json.tool
          # Fail CI if the route returned an error
          echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(1 if 'error' in d else 0)"
