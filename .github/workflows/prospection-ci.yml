# CI/CD pipeline — Veridian Prospection (post-extraction monorepo 2026-05-13)
#
# Déclenche :
#   - push main      → pipeline complet + build/push GHCR :latest (deploy prod manuel via §20)
#   - PR vers main   → pipeline complet (quality gate validation)
#   - workflow_dispatch
#
# Jobs (sériels) :
#   1. quality     : test-mapping (1-pour-1 strict) + tsc + eslint + vitest unit + Supabase guard  (~60s)
#   2. audit       : npm audit + CVE high/critical bloquant via _audit-cve.yml                     (~30s)
#   3. build       : npm run build (Next.js standalone)                                            (~90s)
#   4. integration : vitest e2e/integration vs Postgres éphémère                                   (~60s)
#   5. docker      : buildx + push GHCR (latest + sha) + cache GHA (push main uniquement)          (~3min cold / ~30s warm)
#
# Promotion prod : déclenchée par l'agent via Dokploy API `compose.deploy`
# (cf. CLAUDE.md §20 protocole tier 🔴 étape 6). Le webhook GitHub→Dokploy
# fire à T0 mais l'image GHCR n'est prête qu'à T+5-8min → race condition
# qui déploie l'ancien digest. Garde-fou implicite conservé : pas d'auto-
# deploy prod sur push main, l'agent confirme via `docker inspect`
# que le SHA actif correspond bien au commit avant d'annoncer livré.

name: Prospection CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_NAME: christ-roy/prospection
  PROD_HOST: prospection.app.veridian.site

jobs:
  quality:
    name: Quality gate (test-mapping + tsc + eslint + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history pour test-mapping vs origin/main

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci

      - name: test-mapping (1-pour-1 strict, dette acceptée via pending list)
        env:
          BASE_REF: origin/main
        run: bash scripts/ci/check-test-mapping.sh

      - name: tsc --noEmit
        run: npx tsc --noEmit

      - name: eslint src/
        run: npx eslint src/ --quiet

      - name: vitest unit tests (src/**/*.test.ts)
        run: npx vitest run src/

  audit:
    name: CVE audit (high+critical bloquant)
    uses: ./.github/workflows/_audit-cve.yml
    with:
      app-path: .
      package-manager: npm
      node-version: "20"
      omit-dev: true

  build:
    needs: [quality, audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build

  integration:
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: prospection_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Apply schema
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/prospection_test
        run: npx prisma db push --accept-data-loss --skip-generate
      - name: Run integration tests (parallel — disjoint tenant_id + SIREN prefixes)
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/prospection_test
        run: |
          # tenant-isolation uses tenants aaaa/bbbb + SIREN prefix 998.
          # workspace-isolation uses tenants cccc/dddd + SIREN prefix 999.
          # No overlap → safe to run in parallel (vitest default).
          npx vitest run e2e/integration/tenant-isolation.test.ts e2e/integration/workspace-isolation.test.ts

  # ── Build + push image GHCR (sur push main uniquement) ──────────────────
  docker:
    name: Build + push GHCR (latest + sha)
    needs: [build, integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha7: ${{ steps.sha.outputs.sha7 }}
    steps:
      - id: sha
        run: echo "sha7=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      # CR_PAT (Personal Access Token user-level) au lieu de GITHUB_TOKEN :
      # le package ghcr.io/christ-roy/prospection est encore lié au repo legacy
      # Christ-Roy/prospection (pré-monorepo), GITHUB_TOKEN de ce repo ne push pas.
      # À nettoyer un jour : transférer le package GHCR vers veridian-prospection.
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - id: build_time
        run: echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://api.app.veridian.site
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.PROD_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_HUB_URL=https://app.veridian.site
            NEXT_PUBLIC_SITE_URL=https://prospection.app.veridian.site
            NEXT_PUBLIC_TRIAL_DAYS=7
            COMMIT_SHA=${{ github.sha }}
            BUILT_AT=${{ steps.build_time.outputs.built_at }}

      # ─── Force Dokploy redeploy + verify SHA ────────────────────────────
      # Fix race condition webhook Dokploy : le webhook GitHub fire à T0 mais
      # l'image GHCR :latest n'est prête qu'à T+5-8min, donc Dokploy déploie
      # l'ancien digest puis ne re-déclenche jamais. On force compose.deploy
      # ICI (après push GHCR confirmé) et on poll /api/version pour vérifier
      # que le container actif tourne bien le nouveau SHA.
      # Cf. memory project_prospection_dokploy_webhook_fail.md.
      - name: Force Dokploy redeploy (fallback webhook stale)
        env:
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          COMPOSE_ID: 0mJI-sSt6jcOMr_2QJ1iI
          PROD_URL: https://prospection.app.veridian.site
          EXPECTED_SHA: ${{ steps.sha.outputs.sha7 }}
        run: |
          echo "::add-mask::$DOKPLOY_API_KEY"
          echo "Triggering compose.deploy for compose $COMPOSE_ID"
          HTTP_CODE=$(curl -sS -o /tmp/deploy.out -w "%{http_code}" \
            -X POST "https://dokploy.veridian.site/api/compose.deploy" \
            -H "x-api-key: $DOKPLOY_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"composeId\":\"$COMPOSE_ID\"}")
          echo "compose.deploy → HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            cat /tmp/deploy.out
            echo "::error::compose.deploy failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Waiting container to bascule to SHA $EXPECTED_SHA (max 120s)"
          for i in $(seq 1 12); do
            sleep 10
            ACTUAL=$(curl -fsS --max-time 5 "$PROD_URL/api/version" 2>/dev/null \
              | jq -r '.commit_sha[0:7]' 2>/dev/null || echo "stale")
            if [ "$ACTUAL" = "$EXPECTED_SHA" ]; then
              echo "✓ Container redeployed at SHA $ACTUAL (attempt $i/12)"
              exit 0
            fi
            echo "[$i/12] container at '$ACTUAL', expected '$EXPECTED_SHA'"
          done
          echo "::error::Container did not bascule to $EXPECTED_SHA within 120s"
          curl -sS "$PROD_URL/api/version" || true
          exit 1
