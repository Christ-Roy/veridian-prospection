# CI/CD pipeline — Veridian Prospection (post-extraction monorepo 2026-05-13)
#
# Déclenche :
#   - push main      → pipeline complet + build/push GHCR :latest → webhook Dokploy → redeploy prod
#   - PR vers main   → pipeline complet (quality gate validation)
#   - workflow_dispatch
#
# Jobs (sériels) :
#   1. quality     : test-mapping (1-pour-1 strict) + tsc + eslint + vitest unit + Supabase guard  (~60s)
#   2. audit       : npm audit + CVE high/critical bloquant via _audit-cve.yml                     (~30s)
#   3. build       : npm run build (Next.js standalone)                                            (~90s)
#   4. integration : vitest e2e/integration vs Postgres éphémère                                   (~60s)
#   5. docker      : buildx + push GHCR (latest + sha) + cache GHA (push main uniquement)          (~3min cold / ~30s warm)
#   6. smoke-prod  : curl prod endpoints (laisse Dokploy webhook redeploy + healthcheck)           (~90s)

name: Prospection CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_NAME: christ-roy/prospection
  PROD_HOST: prospection.app.veridian.site

jobs:
  quality:
    name: Quality gate (test-mapping + tsc + eslint + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history pour test-mapping vs origin/main

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci

      - name: test-mapping (1-pour-1 strict, dette acceptée via pending list)
        env:
          BASE_REF: origin/main
        run: bash scripts/ci/check-test-mapping.sh

      - name: tsc --noEmit
        run: npx tsc --noEmit

      - name: eslint src/
        run: npx eslint src/ --quiet

      - name: vitest unit tests (src/**/*.test.ts)
        run: npx vitest run src/

      - name: Supabase admin API rate-limit guard
        run: bash scripts/check-supabase-ratelimit.sh

  audit:
    name: CVE audit (high+critical bloquant)
    uses: ./.github/workflows/_audit-cve.yml
    with:
      app-path: .
      package-manager: npm
      node-version: "20"
      omit-dev: true

  build:
    needs: [quality, audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build

  integration:
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: prospection_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Apply schema
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/prospection_test
        run: npx prisma db push --accept-data-loss --skip-generate
      - name: Run integration tests (parallel — disjoint tenant_id + SIREN prefixes)
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/prospection_test
        run: |
          # tenant-isolation uses tenants aaaa/bbbb + SIREN prefix 998.
          # workspace-isolation uses tenants cccc/dddd + SIREN prefix 999.
          # No overlap → safe to run in parallel (vitest default).
          npx vitest run e2e/integration/tenant-isolation.test.ts e2e/integration/workspace-isolation.test.ts

  # ── Build + push image GHCR (sur push main uniquement) ──────────────────
  docker:
    name: Build + push GHCR (latest + sha)
    needs: [build, integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha7: ${{ steps.sha.outputs.sha7 }}
    steps:
      - id: sha
        run: echo "sha7=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      # CR_PAT (Personal Access Token user-level) au lieu de GITHUB_TOKEN :
      # le package ghcr.io/christ-roy/prospection est encore lié au repo legacy
      # Christ-Roy/prospection (pré-monorepo), GITHUB_TOKEN de ce repo ne push pas.
      # À nettoyer un jour : transférer le package GHCR vers veridian-prospection.
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://api.app.veridian.site
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.PROD_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_HUB_URL=https://app.veridian.site
            NEXT_PUBLIC_SITE_URL=https://prospection.app.veridian.site
            NEXT_PUBLIC_TRIAL_DAYS=7

  # ── Smoke prod après webhook Dokploy redeploy ───────────────────────────
  smoke-prod:
    name: Smoke prod (post webhook Dokploy)
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Attendre que Dokploy ait pull + restart (max 3 min)
        run: |
          # Dokploy webhook trigger après push GHCR :latest.
          # Le redeploy compose pull + up -d + healthcheck start_period 30s.
          # On laisse 30s avant le 1er check pour pas hit l'ancien container.
          sleep 30

      - name: GET /api/health (attendre 200, max 6 essais × 15s = 90s)
        run: |
          for i in $(seq 1 6); do
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" "https://${{ env.PROD_HOST }}/api/health" || echo "000")
            echo "[$i/6] /api/health → $CODE"
            if [ "$CODE" = "200" ]; then exit 0; fi
            sleep 15
          done
          echo "::error::Smoke prod /api/health timeout après 90s — vérifier Dokploy logs"
          exit 1

      - name: GET /api/auth/providers
        run: |
          CODE=$(curl -sS -o /dev/null -w "%{http_code}" "https://${{ env.PROD_HOST }}/api/auth/providers")
          [ "$CODE" = "200" ] || { echo "::error::auth providers → $CODE"; exit 1; }

      - name: GET /login (page render)
        run: |
          CODE=$(curl -sS -o /dev/null -w "%{http_code}" "https://${{ env.PROD_HOST }}/login")
          [ "$CODE" = "200" ] || { echo "::error::/login → $CODE"; exit 1; }

      - name: Annonce succès
        run: |
          echo "::notice::Prod redeploy OK — https://${{ env.PROD_HOST }} all green"
