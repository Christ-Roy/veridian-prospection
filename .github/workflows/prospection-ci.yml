# CI pipeline — Veridian Prospection (mono-app, post-extraction monorepo 2026-05-13)
#
# Pipeline simplifié :
#   1. unit        : tsc + eslint + vitest unit                   (~60s, bloquant)
#   2. audit       : npm audit --audit-level=high                 (~30s, bloquant)
#   3. build       : npm run build (Next.js standalone)           (~90s, bloquant)
#   4. integration : vitest e2e/integration vs Postgres service   (~60s, bloquant)
#   5. docker      : build image + push GHCR (latest + sha)       (~3min, sur push main)
#
# Le déploiement prod se fera par Dokploy GitOps (webhook sur push main) après
# la bascule de la stack Dokploy `0mJI-sSt6jcOMr_2QJ1iI` en mode Git provider.
# En attendant, le push de l'image GHCR :latest suffit (Dokploy actuel en mode Raw
# pull :latest et redeploy).

name: Prospection CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_NAME: christ-roy/prospection

jobs:
  unit:
    # Bloquant ultra-rapide : tsc + eslint + vitest (sans DB).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: tsc --noEmit
        run: npx tsc --noEmit
      - name: eslint src/
        run: npx eslint src/ --quiet
      - name: vitest unit tests (src/**/*.test.ts)
        run: npx vitest run src/
      - name: Supabase admin API rate-limit guard
        run: bash scripts/check-supabase-ratelimit.sh

  audit:
    name: CVE audit (high+critical bloquant)
    uses: ./.github/workflows/_audit-cve.yml
    with:
      app-path: .
      package-manager: npm
      node-version: "20"
      omit-dev: true

  build:
    needs: [unit, audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build

  integration:
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: prospection_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Apply schema
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/prospection_test
        run: npx prisma db push --accept-data-loss --skip-generate
      - name: Run integration tests (parallel — disjoint tenant_id + SIREN prefixes)
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/prospection_test
        run: |
          # tenant-isolation uses tenants aaaa/bbbb + SIREN prefix 998.
          # workspace-isolation uses tenants cccc/dddd + SIREN prefix 999.
          # No overlap → safe to run in parallel (vitest default).
          npx vitest run e2e/integration/tenant-isolation.test.ts e2e/integration/workspace-isolation.test.ts

  # ── Build + push image GHCR (sur push main uniquement) ────────────────
  docker:
    needs: [build, integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      # CR_PAT (Personal Access Token user-level) au lieu de GITHUB_TOKEN.
      # Le package ghcr.io/christ-roy/prospection est encore lié au repo legacy
      # Christ-Roy/prospection (pré-monorepo), donc le GITHUB_TOKEN de ce repo
      # ne peut pas push. À nettoyer plus tard : transférer le package GHCR
      # vers veridian-prospection via Settings UI.
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://api.app.veridian.site
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.PROD_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_HUB_URL=https://app.veridian.site
            NEXT_PUBLIC_SITE_URL=https://prospection.app.veridian.site
            NEXT_PUBLIC_TRIAL_DAYS=7
