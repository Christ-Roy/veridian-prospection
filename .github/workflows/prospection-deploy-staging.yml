# Deploy staging — Veridian Prospection
#
# Pipeline staging-first (CI-ARCHITECTURE.md §3) :
#   1. quality   : gate bloquant (lint, typecheck, unit, audit, test-mapping, render check)
#   2. build     : Docker buildx push GHCR (tag staging-<sha> + staging-latest)
#   3. deploy    : SSH dev-pub, compose pull + up -d (rejoint network staging-edge)
#   4. smoke     : curl staging.veridian.site health/auth
#   5. cleanup   : prune containers/images staging obsolètes côté dev
#
# Aucun push direct vers main n'arrive en prod. Tout passe par PR staging→main
# avec branch protection exigeant cette CI verte.

name: Prospection Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: deploy-staging-prospection
  cancel-in-progress: false  # un deploy en cours ne doit pas être interrompu

env:
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_NAME: christ-roy/prospection
  COMPOSE_PROJECT: prospection-staging
  STAGING_HOST: prospection.staging.veridian.site

jobs:
  quality:
    name: Quality gate (lint + typecheck + unit + audit + test-mapping)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history pour test-mapping vs origin/main
          submodules: recursive  # shared/ submodule veridian-infra

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: tsc --noEmit
        run: npx tsc --noEmit

      - name: eslint src/
        run: npx eslint src/ --quiet

      - name: vitest unit
        run: npx vitest run src/

      - name: npm audit (high+critical bloquant)
        run: npm audit --audit-level=high --omit=dev

      - name: test-mapping check (vs origin/main)
        env:
          BASE_REF: origin/main
        run: bash scripts/ci/check-test-mapping.sh

      # NOTE : `render-compose.sh check` désactivé temporairement.
      # La sortie de `docker compose config` varie selon la version CLI
      # (map vs liste pour environment, présence de bloc networks: top-level).
      # Tant qu'on n'a pas un check sémantique (parse YAML normalisé),
      # on compte sur la discipline humaine + le rappel ci-dessous.
      - name: rappel régénération compose
        run: |
          echo "::notice::Si tu as modifié infra/docker-compose.{base,prod}.yml,"
          echo "::notice::n'oublie pas de lancer ./scripts/ci/render-compose.sh prod"
          echo "::notice::et de commiter le infra/docker-compose.yml régénéré."

  build:
    name: Build + push GHCR (staging-<sha>)
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      # SHA short (7 chars) — match docker/metadata-action default for type=sha
      sha7: ${{ steps.sha.outputs.sha7 }}
    steps:
      - id: sha
        run: echo "sha7=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          submodules: recursive  # shared/ submodule veridian-infra

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - id: build_time
        run: echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://api.app.veridian.site
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.STAGING_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_HUB_URL=https://app.veridian.site
            NEXT_PUBLIC_SITE_URL=https://prospection.staging.veridian.site
            NEXT_PUBLIC_TRIAL_DAYS=7
            COMMIT_SHA=${{ github.sha }}
            BUILT_AT=${{ steps.build_time.outputs.built_at }}

  deploy:
    name: Deploy → dev-pub (Traefik staging-edge)
    needs: build
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: staging-${{ needs.build.outputs.sha7 }}
    steps:
      - uses: actions/checkout@v6

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 37.187.199.185 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy compose files to dev
        run: |
          DEST=/home/ubuntu/prospection-staging
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new ubuntu@37.187.199.185 \
            "mkdir -p $DEST"
          scp -i ~/.ssh/id_ed25519 \
            infra/docker-compose.base.yml \
            infra/docker-compose.staging.yml \
            ubuntu@37.187.199.185:$DEST/

      - name: Write .env on dev (secrets staging)
        run: |
          DEST=/home/ubuntu/prospection-staging
          echo "Image tag à déployer : ${IMAGE_TAG}"
          ssh -i ~/.ssh/id_ed25519 ubuntu@37.187.199.185 "cat > $DEST/.env <<'ENV_EOF'
          PROSPECTION_IMAGE_TAG=${IMAGE_TAG}
          DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}
          AUTH_SECRET=${{ secrets.STAGING_AUTH_SECRET }}
          TENANT_API_SECRET=${{ secrets.STAGING_TENANT_API_SECRET }}
          HUB_API_URL=${{ secrets.STAGING_HUB_API_URL }}
          HUB_WEBHOOK_TOKEN=${{ secrets.STAGING_HUB_WEBHOOK_TOKEN }}
          TELNYX_PUBLIC_KEY=${{ secrets.STAGING_TELNYX_PUBLIC_KEY }}
          ENV_EOF
          chmod 600 $DEST/.env"

      - name: Login GHCR on dev (pull image)
        run: |
          ssh -i ~/.ssh/id_ed25519 ubuntu@37.187.199.185 \
            "echo '${{ secrets.CR_PAT }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin"

      - name: Compose pull + up -d
        run: |
          DEST=/home/ubuntu/prospection-staging
          ssh -i ~/.ssh/id_ed25519 ubuntu@37.187.199.185 "
            cd $DEST &&
            docker compose -p ${{ env.COMPOSE_PROJECT }} \
              -f docker-compose.base.yml -f docker-compose.staging.yml \
              pull &&
            docker compose -p ${{ env.COMPOSE_PROJECT }} \
              -f docker-compose.base.yml -f docker-compose.staging.yml \
              up -d --remove-orphans"

      # Migration Prisma — solution pérenne au trou §18.9.
      #
      # Le container app vire npm/npx (CVE hygiene), donc on ne peut pas
      # appeler prisma migrate deploy depuis lui. On utilise un container
      # node:22-alpine éphémère sur dev-pub avec le dossier prisma/ volumé,
      # qui joint le réseau interne pour atteindre postgres-staging.
      #
      # Idempotent : prisma migrate deploy ne re-applique pas une migration
      # déjà présente dans _prisma_migrations.
      - name: Copy prisma migrations to dev
        run: |
          DEST=/home/ubuntu/prospection-staging
          rsync -az -e "ssh -i ~/.ssh/id_ed25519" \
            prisma/ \
            ubuntu@37.187.199.185:$DEST/prisma/

      - name: Run prisma migrate deploy (staging DB)
        # Container éphémère sur le réseau staging-edge (où vit postgres-staging).
        # Idempotent : prisma migrate deploy skip les migrations déjà appliquées.
        run: |
          DEST=/home/ubuntu/prospection-staging
          ssh -i ~/.ssh/id_ed25519 ubuntu@37.187.199.185 "
            cd $DEST &&
            docker run --rm \
              --network staging-edge \
              -v \$PWD/prisma:/app/prisma \
              -w /app \
              -e DATABASE_URL=\"${{ secrets.STAGING_DATABASE_URL }}\" \
              node:22-alpine sh -c 'apk add --no-cache openssl >/dev/null && npm install --no-package-lock --silent prisma@6.19.2 2>&1 | tail -3 && npx prisma migrate deploy'
          "

      - name: Wait healthcheck (max 90s)
        run: |
          ssh -i ~/.ssh/id_ed25519 ubuntu@37.187.199.185 '
            for i in $(seq 1 18); do
              STATUS=$(docker inspect --format "{{.State.Health.Status}}" prospection-staging-prospection-1 2>/dev/null || echo "starting")
              echo "[$i/18] healthcheck: $STATUS"
              if [ "$STATUS" = "healthy" ]; then exit 0; fi
              sleep 5
            done
            echo "Healthcheck failed after 90s"
            docker logs --tail 50 prospection-staging-prospection-1
            exit 1'

  smoke:
    name: Smoke test staging
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      # Staging accessible uniquement via tailnet Veridian (2026-05-19).
      # Cf veridian-hub/docs/CONTRAT-HUB.md §8.6.
      - name: Tailscale (connect runner to tailnet for staging smoke)
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-github
          version: latest

      - name: GET /api/health
        run: |
          for i in $(seq 1 6); do
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" "https://${{ env.STAGING_HOST }}/api/health" || echo "000")
            echo "[$i/6] /api/health → $CODE"
            if [ "$CODE" = "200" ]; then exit 0; fi
            sleep 5
          done
          echo "Smoke /api/health failed"
          exit 1

      - name: GET /api/auth/providers
        run: |
          CODE=$(curl -sS -o /dev/null -w "%{http_code}" "https://${{ env.STAGING_HOST }}/api/auth/providers")
          [ "$CODE" = "200" ] || { echo "auth providers → $CODE"; exit 1; }

      - name: GET /login (page render)
        run: |
          CODE=$(curl -sS -o /dev/null -w "%{http_code}" "https://${{ env.STAGING_HOST }}/login")
          [ "$CODE" = "200" ] || { echo "/login → $CODE"; exit 1; }

      # ── Dashboard crawler — détection batch erreurs UI/hydration/500 ──
      # Voir e2e/dashboard-crawler.spec.ts : login canonical e2e-persistent
      # puis visite toutes les pages dashboard, assert pas d'erreur visible
      # ni console.error. Chope les régressions transverses qui passeraient
      # entre les mailles des tests ciblés.
      #
      # Exécuté DANS un container Playwright SUR dev-pub, sur le réseau
      # staging-edge. Raison : depuis la migration helper Auth.js v5
      # (commit ce5b56f, 2026-05-22), le helper exige DATABASE_URL pointant
      # sur la DB de l'app pour seeder le compte canonique. Ce DATABASE_URL
      # contient l'hôte Docker interne `postgres-staging:5432`, non
      # résolvable depuis le runner GHA (DNS Docker non exporté hors host).
      # Cf todo/2026-05-22-fix-crawler-database-url-staging-ci.md (option A).
      - name: Checkout (pour rsync spec + helpers vers dev-pub)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install SSH key (accès dev-pub pour container Playwright)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 37.187.199.185 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync crawler payload to dev-pub
        # Subset minimal nécessaire au crawler : config Playwright, manifest npm
        # (avec lock), schema Prisma + migrations (pour le seed via helper),
        # le spec crawler et le helper auth. Le `dist` complet de l'app n'est
        # pas nécessaire — le container Playwright tape l'app via HTTPS public.
        #
        # Garde-fou anti-saturation disque (cf 2026-05-23 cleanup ticket) :
        # un sweep préemptif des résidus > 1h avant chaque run. Si la CI
        # précédente a été cancelled, ses fichiers (root-owned via container
        # Playwright) restent dans /tmp ; on les vire via un container alpine
        # (root) avant de bosser, pour ne pas accumuler.
        run: |
          DEST=/tmp/prosp-crawler-${{ github.run_id }}
          ssh -i ~/.ssh/id_ed25519 ubuntu@37.187.199.185 "
            docker run --rm -v /tmp:/tmp alpine sh -c \
              'find /tmp -maxdepth 1 -name \"prosp-crawler-*\" -type d -mmin +60 -exec rm -rf {} + 2>/dev/null || true'
            rm -rf $DEST && mkdir -p $DEST
          "
          rsync -az -e "ssh -i ~/.ssh/id_ed25519" \
            --include='package.json' \
            --include='package-lock.json' \
            --include='playwright.config.ts' \
            --include='tsconfig.json' \
            --include='prisma/' --include='prisma/schema.prisma' \
            --include='prisma/migrations/***' \
            --include='e2e/' --include='e2e/dashboard-crawler.spec.ts' \
            --include='e2e/helpers/' --include='e2e/helpers/auth.ts' \
            --exclude='*' \
            ./ ubuntu@37.187.199.185:$DEST/

      - name: Run dashboard crawler (Playwright container on staging-edge)
        # Container Playwright éphémère sur dev-pub :
        #  - réseau `staging-edge` → résout `postgres-staging:5432` pour le seed
        #    Prisma ET tape `https://prospection.staging.veridian.site` en sortie
        #    (Traefik externe routé par le DNS public).
        #  - PROSPECTION_URL en HTTPS : NODE_ENV=production côté app exige
        #    `__Secure-authjs.session-token` (cookie Secure-flag, posé qu'en
        #    HTTPS). Taper l'URL HTTP interne `http://prospection:3000` casse
        #    le login Auth.js v5 (cookie non posé / non re-renvoyé).
        #  - npm ci silencieux + npx playwright test (browsers déjà présents
        #    dans l'image Playwright officielle).
        env:
          DEST: /tmp/prosp-crawler-${{ github.run_id }}
        run: |
          ssh -i ~/.ssh/id_ed25519 ubuntu@37.187.199.185 "
            docker run --rm \
              --network staging-edge \
              -v $DEST:/work \
              -w /work \
              -e CI=1 \
              -e PROSPECTION_URL=https://${{ env.STAGING_HOST }} \
              -e DATABASE_URL='${{ secrets.STAGING_DATABASE_URL }}' \
              mcr.microsoft.com/playwright:v1.60.0-jammy \
              bash -c 'npm ci --silent 2>&1 | tail -3 && npx playwright test e2e/dashboard-crawler.spec.ts --project=chromium --reporter=list'
          "

      - name: Collect crawler artifacts from dev-pub (si fail)
        if: failure()
        env:
          DEST: /tmp/prosp-crawler-${{ github.run_id }}
        run: |
          mkdir -p test-results playwright-report
          rsync -az -e "ssh -i ~/.ssh/id_ed25519" \
            ubuntu@37.187.199.185:$DEST/test-results/ test-results/ 2>/dev/null || true
          rsync -az -e "ssh -i ~/.ssh/id_ed25519" \
            ubuntu@37.187.199.185:$DEST/playwright-report/ playwright-report/ 2>/dev/null || true

      - name: Cleanup crawler payload on dev-pub
        # Le container Playwright tourne en root et crée node_modules en
        # root-owned dans $DEST. Un `rm -rf` en ubuntu (via SSH) échoue avec
        # "Permission denied" → le `|| true` masquait l'erreur et le dir
        # restait résiduel (~3 GB par run). Fix : passer par un container
        # alpine root qui monte /tmp et peut effacer les fichiers root-owned.
        # Cf todo/2026-05-23-dev-pub-cleanup-crawler-tmp-residuels.md.
        if: always()
        env:
          DEST: /tmp/prosp-crawler-${{ github.run_id }}
        run: |
          ssh -i ~/.ssh/id_ed25519 ubuntu@37.187.199.185 "
            docker run --rm -v /tmp:/tmp alpine sh -c 'rm -rf $DEST' 2>&1 || \
              echo '::warning::Cleanup container failed, dir may persist'
          " || true

      - name: Upload crawler artifacts (screenshots/traces si fail)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-crawler-artifacts
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  cleanup:
    name: Cleanup images Prospection obsolètes (dev-pub)
    needs: [build, deploy, smoke]
    if: always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    # GHCR est la source de vérité des images (rétention illimitée côté
    # registry). dev-pub ne garde QUE l'image staging actuellement servie
    # — toute image staging-<sha> antérieure est re-pullable depuis GHCR
    # en cas de rollback. Le filtre `label=com.veridian.env=staging` de
    # l'ancien job ne matchait AUCUNE image (les images portent les labels
    # OCI standard `org.opencontainers.image.*`, pas ce label custom) :
    # le cleanup tournait à vide et le disque dev-pub se remplissait.
    env:
      KEEP_TAG: staging-${{ needs.build.outputs.sha7 }}
    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 37.187.199.185 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Prune containers Prospection exited
        run: |
          ssh -i ~/.ssh/id_ed25519 ubuntu@37.187.199.185 '
            docker container prune -f \
              --filter "name=prospection-staging" || true'

      - name: Remove old Prospection images (keep current + latest)
        run: |
          ssh -i ~/.ssh/id_ed25519 ubuntu@37.187.199.185 "
            set -e
            KEEP_TAG='${KEEP_TAG}'
            REPO=ghcr.io/christ-roy/prospection
            echo \"Image servie à conserver : \$REPO:\$KEEP_TAG (+ :staging-latest)\"
            # Liste toutes les images Prospection, supprime celles qui ne sont
            # ni le SHA déployé ni le tag mouvant staging-latest. GHCR garde tout.
            docker images \"\$REPO\" --format '{{.Repository}}:{{.Tag}}' \
              | grep -v \":\$KEEP_TAG\$\" \
              | grep -v ':staging-latest\$' \
              | grep -v ':<none>\$' \
              | xargs -r -I{} docker rmi {} 2>/dev/null || true
            echo '--- images Prospection restantes ---'
            docker images \"\$REPO\" --format '{{.Repository}}:{{.Tag}} {{.Size}}'"

      - name: Prune dangling images globales
        run: |
          ssh -i ~/.ssh/id_ed25519 ubuntu@37.187.199.185 '
            docker image prune -f'

      - name: Report disk usage post-cleanup
        run: |
          ssh -i ~/.ssh/id_ed25519 ubuntu@37.187.199.185 '
            df -h / | tail -1
            echo "--- docker disk ---"
            docker system df'
