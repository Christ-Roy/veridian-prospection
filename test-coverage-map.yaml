    assertions Vitest couvrant le contrat opérationnel :
      - nextRetryDelayMs : timings exponential 1min/5min/15min/60min/24h,
        cap à 24h pour attempts > 5, 0 pour attempts <= 0
      - MAIL_OUTBOX_MAX_ATTEMPTS = 5 (constante exportée stable)
      - applySignatureIfEnabled : no-op si config absente / disabled /
        signature vide, append wrapper div .veridian-mail-signature en
        HTML + plain text séparé par "--", pas de mutation du payload
        input (immutable)
      - flushOutbox via DI complet (resolveCreds + send + now mockés,
        prisma stub) : queue vide → picked=0, send OK → status=sent +
        bump lead_emails(messageId), SMTP fail transient → failed_retry
        + nextRetryAt = now + 1min (attempts=1), à MAX-1 → encore
        failed_retry, à MAX → failed + lead_emails(failed) + log error,
        resolveCreds=null → failed sans send tenté, payload corrompu →
        failed sans send tenté.
    Sabotage : changer le tableau RETRY_DELAYS_MS → test timings rouge.
    Retirer le early return si signature_enabled false → test "no-op
    if disabled" rouge. Cap MAX_ATTEMPTS à 4 → test "at MAX" comporte
    une assertion attempts=5 rouge.

