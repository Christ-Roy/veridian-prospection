- sources:
    - src/lib/notifuse/client.ts
    - src/lib/notifuse/client.test.ts
  covered_by:
    - src/lib/notifuse/client.test.ts
  reason: |
    Test colocalisé (passe 2026-05-23 notifuse-mail). 11 tests Vitest
    couvrent l'envoi transactional best-effort : 8 reasons explicites
    (sent / missing_template / auth_failed / timeout / etc.), contrat
