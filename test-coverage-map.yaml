# test-coverage-map.yaml — Standard CI Veridian §1
#
# Déclare ici les fichiers critiques qui ne suivent PAS la convention canonique
# de chemin (1 source → 1 test colocalisé au même chemin) mais sont légitimement
# couverts par un test situé ailleurs (ex : test integration qui exerce un helper).
#
# Le hook pre-push check-test-mapping.sh lit ce fichier comme fallback :
# si une source modifiée n'a pas de test colocalisé, il cherche ici.
# Au moins UN des `covered_by` doit être modifié dans la même PR.
#
# Format strict :
# - sources:
#     - <chemin/source/relatif.ts>
#   covered_by:
#     - <chemin/test/relatif.test.ts>
#   reason: |
#     Justification écrite. Pas de "TODO refactor", expliquer POURQUOI ce test
#     couvre fonctionnellement le code source.
#
# Renovate et agents auto ne peuvent pas ajouter de couverture sans toucher
# ce fichier. Reviewable comme du code.

# Aucune couverture non-canonique déclarée pour le moment.

- sources:
    - src/lib/invitations.ts
    - src/lib/invitations.test.ts
  covered_by:
    - src/lib/invitations.test.ts
  reason: |
    Le test du helper invitations est COLOCALISÉ à côté de la source
    (`src/lib/invitations.test.ts`), pas dans __tests__/lib/. Pattern
    historique repris depuis la version Supabase pré-migration Auth.js v5.
    La convention canonique (__tests__/lib/invitations.test.ts) n'est pas
    appliquée ici, mais la couverture EST réelle : 16 tests Vitest
    mockent Prisma + bcrypt, asserent qu'aucun fetch Supabase n'est
    appelé, et valident le contrat Auth.js v5 (User+Account+WorkspaceMember
    + anti-double-grant). Hotfix 2026-05-23.

# ── Tests colocalisés src/lib/ (passe robustesse 2026-05-23) ────────────
# Pattern : test colocalisé `src/lib/<X>.test.ts` couvre `src/lib/<X>.ts`.
# Le check-test-mapping canonique cherche `__tests__/lib/<X>.test.test.ts`
# (double .test), ce qui est un faux positif inhérent à la colocalisation.
# On déclare ici les paires pour qu'elles soient acceptées.

