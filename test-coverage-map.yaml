# test-coverage-map.yaml — Standard CI Veridian §1
#
# Déclare ici les fichiers critiques qui ne suivent PAS la convention canonique
# de chemin (1 source → 1 test colocalisé au même chemin) mais sont légitimement
# couverts par un test situé ailleurs (ex : test integration qui exerce un helper).
#
# Le hook pre-push check-test-mapping.sh lit ce fichier comme fallback :
# si une source modifiée n'a pas de test colocalisé, il cherche ici.
# Au moins UN des `covered_by` doit être modifié dans la même PR.
#
# Format strict :
# - sources:
#     - <chemin/source/relatif.ts>
#   covered_by:
#     - <chemin/test/relatif.test.ts>
#   reason: |
#     Justification écrite. Pas de "TODO refactor", expliquer POURQUOI ce test
#     couvre fonctionnellement le code source.
#
# Renovate et agents auto ne peuvent pas ajouter de couverture sans toucher
# ce fichier. Reviewable comme du code.

# Aucune couverture non-canonique déclarée pour le moment.

- sources:
    - src/lib/invitations.ts
    - src/lib/invitations.test.ts
  covered_by:
    - src/lib/invitations.test.ts
  reason: |
    Le test du helper invitations est COLOCALISÉ à côté de la source
    (`src/lib/invitations.test.ts`), pas dans __tests__/lib/. Pattern
    historique repris depuis la version Supabase pré-migration Auth.js v5.
    La convention canonique (__tests__/lib/invitations.test.ts) n'est pas
    appliquée ici, mais la couverture EST réelle : 16 tests Vitest
    mockent Prisma + bcrypt, asserent qu'aucun fetch Supabase n'est
    appelé, et valident le contrat Auth.js v5 (User+Account+WorkspaceMember
    + anti-double-grant). Hotfix 2026-05-23.

# ── Tests colocalisés src/lib/ (passe robustesse 2026-05-23) ────────────
# Pattern : test colocalisé `src/lib/<X>.test.ts` couvre `src/lib/<X>.ts`.
# Le check-test-mapping canonique cherche `__tests__/lib/<X>.test.test.ts`
# (double .test), ce qui est un faux positif inhérent à la colocalisation.
# On déclare ici les paires pour qu'elles soient acceptées.

- sources:
    - src/lib/audit.ts
    - src/lib/audit.test.ts
  covered_by:
    - src/lib/audit.test.ts
  reason: |
    Test colocalisé (passe 2026-05-23 lib-tests-coverage). 9 tests
    Vitest mocks Prisma + Next/headers, couvre logAudit fail-safe
    (P2021 warn-une-fois, DB down, non-Error catché) + payload Prisma
    exact. Sabotage-test : casser le mapping payload → tests rouges.

- sources:
    - src/lib/cache.ts
    - src/lib/cache.test.ts
  covered_by:
    - src/lib/cache.test.ts
  reason: |
    Test colocalisé. 9 tests : TTL sync/async, isolation par clé,
    promise rejetée non-cachée, invalidate/invalidatePrefix.

- sources:
    - src/lib/auth/api-auth.ts
    - src/lib/auth/api-auth.test.ts
  covered_by:
    - src/lib/auth/api-auth.test.ts
  reason: |
    Test colocalisé. 8 tests : requireAuth fail-closed sur session
    incomplète, shape stricte `{id,email}` anti-leak. Hot path auth.

- sources:
    - src/lib/auth/user-context.ts
    - src/lib/auth/user-context.test.ts
  covered_by:
    - src/lib/auth/user-context.test.ts
  reason: |
    Test colocalisé. 34 tests : résolution multi-tenant
    owner+invité, isolation cross-tenant (filtre workspaces), isAdmin,
    activeWorkspaceId anti-spoof, cache 30s, requireUser/requireAdmin
    401/403, getWorkspaceFilter/getUserFilter/resolveInsertWorkspaceId.

- sources:
    - src/lib/auth/middleware.ts
    - src/lib/auth/middleware.test.ts
  covered_by:
    - src/lib/auth/middleware.test.ts
  reason: |
    Test colocalisé. 22 tests : bypass 13 routes publiques, API sans
    session → next() (délègue 401 handler), pages → redirect
    `/login?redirect=`, session OK → passe.

- sources:
    - src/lib/auth/roles.ts
    - src/lib/auth/roles.test.ts
  covered_by:
    - src/lib/auth/roles.test.ts
  reason: |
    Test colocalisé. 19 tests : matrice RBAC owner/admin/member/viewer
    × 13 actions, type guard, normalize fail-safe vers viewer.
    Sabotage-test : `workspace.delete: owner → viewer` (fail-OPEN
    catastrophique) → 2 tests rouges immédiatement.

- sources:
    - src/lib/notifuse/client.ts
    - src/lib/notifuse/client.test.ts
  covered_by:
    - src/lib/notifuse/client.test.ts
  reason: |
    Test colocalisé (passe 2026-05-23 notifuse-mail). 11 tests Vitest
    couvrent l'envoi transactional best-effort : 8 reasons explicites
    (sent / missing_template / auth_failed / timeout / etc.), contrat
    POST exact, jamais bloquant pour le call parent.
