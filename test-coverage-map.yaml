- sources:
    - src/lib/auth/roles.ts
    - src/lib/auth/roles.test.ts
  covered_by:
    - src/lib/auth/roles.test.ts
  reason: |
    Test colocalisé. 19 tests : matrice RBAC owner/admin/member/viewer
