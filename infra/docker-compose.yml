services:
  prospection-prod:
    image: ghcr.io/christ-roy/prospection:${PROSPECTION_IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - dokploy-network
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      TENANT_API_SECRET: ${TENANT_API_SECRET}
      APP_URL: ${APP_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_HUB_URL: ${NEXT_PUBLIC_HUB_URL}
      TRIAL_DAYS: "7"
      NEXT_PUBLIC_TRIAL_DAYS: "7"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.prospection-prod.rule=Host(`prospection.app.veridian.site`)
      - traefik.http.routers.prospection-prod.entrypoints=websecure
      - traefik.http.routers.prospection-prod.tls.certresolver=letsencrypt
      - traefik.http.services.prospection-prod.loadbalancer.server.port=3000

networks:
  dokploy-network:
    external: true
