# AUTO-GÉNÉRÉ — ne pas éditer à la main.
# Source : docker-compose.base.yml + docker-compose.prod.yml
# Régénération : ./scripts/ci/render-compose.sh prod
#
services:
  prospection:
    cpus: 3.6
    environment:
      APP_URL: https://prospection.app.veridian.site
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      CRON_SECRET: ${CRON_SECRET:-}
      DATABASE_URL: ${DATABASE_URL}
      DEPLOY_ENV: prod
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      HOSTNAME: 0.0.0.0
      HUB_API_URL: ${HUB_API_URL:-https://app.veridian.site}
      HUB_WEBHOOK_TOKEN: ${HUB_WEBHOOK_TOKEN:-}
      NEXT_PUBLIC_HUB_URL: https://app.veridian.site
      NEXT_PUBLIC_SITE_URL: https://prospection.app.veridian.site
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_TRIAL_DAYS: "7"
      NEXTAUTH_URL: https://prospection.app.veridian.site
      NODE_ENV: production
      OPENROUTER_VERIDIAN_KEY: ${OPENROUTER_VERIDIAN_KEY:-}
      PORT: "3000"
      SEARCH_API_SECRET: ${SEARCH_API_SECRET:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      TELNYX_PUBLIC_KEY: ${TELNYX_PUBLIC_KEY:-}
      TENANT_API_SECRET: ${TENANT_API_SECRET}
      TRIAL_DAYS: "7"
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:contact@veridian.site}
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1
      timeout: 5s
      interval: 30s
      retries: 3
      start_period: 30s
    image: ghcr.io/christ-roy/prospection:${PROSPECTION_IMAGE_TAG:-latest}
    labels:
      com.veridian.app: prospection
      com.veridian.env: prod
      traefik.docker.network: dokploy-network
      traefik.enable: "true"
      traefik.http.middlewares.prospection-prod-noindex.headers.customresponseheaders.X-Robots-Tag: noindex, nofollow, noarchive
      traefik.http.routers.prospection-prod.entrypoints: websecure
      traefik.http.routers.prospection-prod.middlewares: prospection-prod-noindex@docker
      traefik.http.routers.prospection-prod.rule: Host(`prospection.app.veridian.site`)
      traefik.http.routers.prospection-prod.tls.certresolver: letsencrypt
      traefik.http.services.prospection-prod.loadbalancer.server.port: "3000"
    mem_limit: "6920601600"
    networks:
      dokploy-network: null
    pull_policy: always
    restart: unless-stopped
networks:
  dokploy-network:
    name: dokploy-network
    external: true
