# Override STAGING — à utiliser avec docker-compose.base.yml.
#
# Cible : Dev Server (37.187.199.185), réseau staging-edge + Traefik standalone.
# Voir doc Traefik staging : dev:~/traefik-staging/README.md
# Hôte routé : prospection.staging.veridian.site

services:
  # ─── DB staging dédiée ──────────────────────────────────────────────────
  # Déclarée DANS le compose versionné (comme hub-staging-db / notifuse-staging-db)
  # pour être reproductible et survivre aux cleanups disque de dev-pub.
  # Auparavant lancée "à la main" hors compose → un `docker volume prune` l'a
  # supprimée (container + volume) le 2026-06-10, cassant staging 6 jours
  # (cf todo/2026-06-11-prospection-staging-unhealthy-recurrent.md).
  # Le container_name fixe `postgres-staging` est requis : le DATABASE_URL des
  # apps pointe sur ce hostname interne sur le réseau staging-edge.
  postgres-staging:
    image: postgres:16-alpine
    container_name: postgres-staging
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${STAGING_DB_USER:-app}
      POSTGRES_PASSWORD: ${STAGING_DB_PASSWORD:?STAGING_DB_PASSWORD requis dans .env}
      POSTGRES_DB: ${STAGING_DB_NAME:-prospection}
    volumes:
      - postgres-staging_pgdata:/var/lib/postgresql/data
    networks:
      - staging-edge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STAGING_DB_USER:-app} -d ${STAGING_DB_NAME:-prospection}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  prospection:
    image: ghcr.io/christ-roy/prospection:${PROSPECTION_IMAGE_TAG:-staging-latest}
    depends_on:
      postgres-staging:
        condition: service_healthy
    networks:
      - staging-edge
      - default
    environment:
      DEPLOY_ENV: staging
      NEXTAUTH_URL: https://prospection.staging.veridian.site
      APP_URL: https://prospection.staging.veridian.site
      NEXT_PUBLIC_SITE_URL: https://prospection.staging.veridian.site
      NEXT_PUBLIC_HUB_URL: https://app.veridian.site
    labels:
      - "com.veridian.env=staging"
      - "com.veridian.app=prospection"
      - "traefik.enable=true"
      - "traefik.docker.network=staging-edge"
      - "traefik.http.routers.prospection.rule=Host(`prospection.staging.veridian.site`)"
      - "traefik.http.routers.prospection.entrypoints=websecure"
      - "traefik.http.routers.prospection.tls.certresolver=letsencrypt"
      - "traefik.http.services.prospection.loadbalancer.server.port=3000"

networks:
  staging-edge:
    external: true
  default:

volumes:
  postgres-staging_pgdata:
