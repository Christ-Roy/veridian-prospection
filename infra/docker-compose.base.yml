# Base compose — partagé entre prod et staging.
#
# Ne pas lancer ce fichier seul. Toujours via override :
#   - prod    : docker compose -f docker-compose.base.yml -f docker-compose.prod.yml ...
#   - staging : docker compose -f docker-compose.base.yml -f docker-compose.staging.yml ...
#
# Le fichier docker-compose.yml (consolidé prod) est généré automatiquement par
# `scripts/ci/render-compose.sh prod` et lu par Dokploy. NE JAMAIS éditer
# directement docker-compose.yml — modifier base + prod et régénérer.

services:
  prospection:
    image: ghcr.io/christ-roy/prospection:${PROSPECTION_IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    # ─── Fusible 60 % VM (politique Veridian) ──────────────────────────
    # VM prod = 11 GB RAM / 6 CPU → 60 % = 6.6 GB / 3.6 CPU max par app.
    # Si une app fuit, OOM-killer la cible elle seule sans tomber la VM.
    # Monitoring : veridian-hub/scripts/ops/claude-hooks/infra-status.sh
    mem_limit: 6600m
    cpus: 3.6
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      TENANT_API_SECRET: ${TENANT_API_SECRET}
      # Bearer machine du moteur de recherche IA (/api/search/*). Si absent,
      # fallback sur TENANT_API_SECRET (cf src/lib/search/auth.ts). Dédié =
      # rotation indépendante du secret cross-app.
      SEARCH_API_SECRET: ${SEARCH_API_SECRET:-}
      # Bearer Prospection→Hub /api/webhooks/prospection (contrat §6.3 pattern C).
      # Lu par src/lib/hub/webhooks.ts. Côté Hub ce token s'appelle
      # PROSPECTION_WEBHOOK_TOKEN (token attribué à Prospection).
      HUB_API_URL: ${HUB_API_URL:-https://app.veridian.site}
      HUB_WEBHOOK_TOKEN: ${HUB_WEBHOOK_TOKEN:-}
      TRIAL_DAYS: "7"
      NEXT_PUBLIC_TRIAL_DAYS: "7"
      # Crons OVH → /api/cron/* (notifs push pre-RDV). Sans : 401 = aucune notif.
      CRON_SECRET: ${CRON_SECRET:-}
      # Google OAuth (Auth.js provider — bouton UI à câbler ultérieurement).
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      # Supabase self-hosted — invitations admin generateLink (best-effort).
      SUPABASE_URL: ${SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      # Web Push VAPID (PWA notifications navigateur).
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:contact@veridian.site}
      # Telnyx Ed25519 public key — vérifie signature /api/phone/telnyx-webhook
      # (T20 fix pentest T16 HIGH). Sans : webhook répond 500 fail-closed.
      TELNYX_PUBLIC_KEY: ${TELNYX_PUBLIC_KEY:-}
      # OpenRouter clé Veridian globale — fallback gratuit IA mail templates
      # (W9d 2026-05-25). Si absent : les tenants sans config IA voient 412.
      # Modèle utilisé par défaut : VERIDIAN_DEFAULT_FREE_MODEL (src/lib/ai/models.ts).
      OPENROUTER_VERIDIAN_KEY: ${OPENROUTER_VERIDIAN_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
